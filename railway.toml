[build]
builder = "NIXPACKS"

[deploy]
startCommand = "/opt/venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
preDeployCommand = "/opt/venv/bin/python manage.py migrate && /opt/venv/bin/python manage.py seed"
healthcheckPath = "/health/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
