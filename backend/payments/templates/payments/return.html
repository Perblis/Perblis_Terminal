<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Payment received — Terminal</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #16181D; color: #F4F1EA;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      text-align: center; padding: 24px;
    }
    .plate { max-width: 420px; }
    h1 { font-size: 1.35rem; letter-spacing: 0.01em; margin: 0 0 8px; }
    p { color: #B8B2A6; line-height: 1.5; margin: 0 0 24px; }
    a.open {
      display: inline-block; padding: 14px 28px; border-radius: 6px;
      background: #E8A33D; color: #16181D; font-weight: 700; text-decoration: none;
    }
    small { display: block; margin-top: 20px; color: #6E6A5F; }
  </style>
</head>
<body>
  <div class="plate">
    <h1>Payment received</h1>
    <p>We're confirming your hire — this only takes a moment. Head back to the Terminal app to watch it go Confirmed.</p>
    <a class="open" href="{{ deep_link }}">Open the Terminal app</a>
    <small>Nothing happens? Open the Terminal app yourself — your hire updates there automatically. You can close this window.</small>
  </div>
  <script>window.location.replace("{{ deep_link|escapejs }}");</script>
</body>
</html>
