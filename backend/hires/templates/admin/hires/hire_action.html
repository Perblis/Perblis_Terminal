{% extends "admin/base_site.html" %}
{% block content %}
<p>{{ title }} — {{ queryset.count }} hire(s) selected:</p>
<ul>
  {% for h in queryset %}
    <li>{{ h.id }} — {{ h.listing.title }} ({{ h.status }})</li>
  {% endfor %}
</ul>
<form action="" method="post">{% csrf_token %}
  {{ form.as_p }}
  {% for h in queryset %}
    <input type="hidden" name="_selected_action" value="{{ h.pk }}">
  {% endfor %}
  <input type="hidden" name="action" value="{{ action_name }}">
  <input type="submit" name="apply" value="{{ submit_label }}" class="default">
</form>
{% endblock %}
