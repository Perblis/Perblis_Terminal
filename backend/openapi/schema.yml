  /api/v1/payments/payouts:
    get:
      operationId: payments_payouts_list
      description: |-
        The supplier's payouts + the payout-strip summary (Wave 7 P2/F11).

        Cursor-paginated rows with a ``summary`` block on the envelope (mirrors the
        messaging list's ``unread_total``). Supplier-only: payout figures are
        supplier-confidential (D-014), and this is their one API home.
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - payments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPayoutList'
          description: ''
  /api/v1/payments/webhook:
    post:
      operationId: payments_webhook_create
      description: |-
        Receive provider webhooks: verify the signature, dedup, 200 fast, process async.

        The signature scheme is the active provider's (Paystack: HMAC-SHA512 of the
        raw body). A hire is only ever marked paid by the async processor after
        re-verifying the charge with the provider — never from this request, and
        never from a client redirect.
      tags:
      - payments
      security:
      - {}
      responses:
        '200':
          description: Accepted (or duplicate — idempotent).
        '400':
          description: Signature could not be verified.
  /api/v1/realtime/token:
    get:
      operationId: realtime_token_retrieve
      description: |-
        Ably TokenRequest scoped to the caller's own channels (TSD §4).

        Capabilities: ``subscribe`` on each ``conv:{id}`` the caller participates in,
        plus their ``user:{id}`` badge/hire-status channel. Keyless → ``not_configured``
        so clients fall back to 15s polling.
      tags:
      - realtime
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/search/list:
    get:
      operationId: search_list_retrieve
      description: |-
        The map result set as a distance-ordered, cursor-paginated list (TSD §3.2).

        ``group_by=asset`` (default) → flat listings with ``more_at_yard``;
        ``group_by=location`` → yard cards interleaved with solo listings.
        Anonymous access; ``search_anon`` throttle (60/min).
      parameters:
      - in: query
        name: asset_class
        schema:
          type: string
        description: Filter to one asset class.
      - in: query
        name: bbox
        schema:
          type: string
        description: Viewport 'min_lng,min_lat,max_lng,max_lat'. Provide this OR lat+lng+radius_km.
      - in: query
        name: cursor
        schema:
          type: string
        description: Opaque keyset pagination cursor.
      - in: query
        name: group_by
        schema:
          type: string
        description: '''asset'' (default) or ''location''.'
      - in: query
        name: lat
        schema:
          type: number
          format: double
        description: Reference latitude (radius mode).
      - in: query
        name: lng
        schema:
          type: number
          format: double
        description: Reference longitude (radius mode).
      - in: query
        name: page_size
        schema:
          type: integer
        description: Items per page (≤100, default 20).
      - in: query
        name: price_max
        schema:
          type: integer
        description: Daily price ceiling (kobo).
      - in: query
        name: price_min
        schema:
          type: integer
        description: Daily price floor (kobo).
      - in: query
        name: q
        schema:
          type: string
        description: Case-insensitive match on title + description.
      - in: query
        name: radius_km
        schema:
          type: number
          format: double
        description: One of 5/10/25/50/100 or custom.
      - in: query
        name: spec_max
        schema:
          type: number
          format: double
        description: Ceiling for the class ★ spec.
      - in: query
        name: spec_min
        schema:
          type: number
          format: double
        description: Floor for the class ★ spec.
      tags:
      - search
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
          description: ''
  /api/v1/search/map:
    get:
      operationId: search_map_retrieve
      description: |-
        Server-aggregated yards + solo listings for a viewport/radius (TSD §3.7).

        Anonymous access is allowed (guest browsing, FSD §6); throttled at the
        ``search_anon`` rate (60/min).
      parameters:
      - in: query
        name: asset_class
        schema:
          type: string
        description: Filter to one asset class.
      - in: query
        name: bbox
        schema:
          type: string
        description: Viewport 'min_lng,min_lat,max_lng,max_lat'. Provide this OR lat+lng+radius_km.
      - in: query
