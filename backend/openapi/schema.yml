components:
  schemas:
    AccountLevelEnum:
      enum:
      - basic
      - verified
      - business_verified
      type: string
      description: |-
        * `basic` - Basic
        * `verified` - Verified
        * `business_verified` - Business verified
    ActorKindEnum:
      enum:
      - user
      - system
      - ops
      type: string
      description: |-
        * `user` - User
        * `system` - System
        * `ops` - Ops
    AssetClassEnum:
      enum:
      - plant_machinery
      - trucks_haulage
      - warehousing
      - terminals_yards
      - land_staging
      type: string
      description: |-
        * `plant_machinery` - Plant & Machinery
        * `trucks_haulage` - Trucks & Haulage
        * `warehousing` - Warehousing & Storage
        * `terminals_yards` - Terminals & Container Yards
        * `land_staging` - Land & Staging
    BlankEnum:
      enum:
      - ''
    CancelledByEnum:
      enum:
      - hirer
      - supplier
      - ops
      - system
      type: string
      description: |-
        * `hirer` - Hirer
        * `supplier` - Supplier
        * `ops` - Ops
        * `system` - System
    Conversation:
      type: object
      description: |-
        A conversation-list row (FSD §8). ``unread_count`` and the masked preview
        are computed for the requesting user (passed via context ``request``).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        kind:
          type: string
          readOnly: true
        hire_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        unlocked:
          type: boolean
          readOnly: true
        counterparty:
          type: object
          additionalProperties: {}
          readOnly: true
        listing:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        yard_name:
          type: string
          nullable: true
          readOnly: true
        last_message_preview:
          type: string
          nullable: true
          readOnly: true
        last_message_at:
          type: string
          format: date-time
          readOnly: true
        unread_count:
          type: integer
          readOnly: true
      required:
      - counterparty
      - hire_id
      - id
      - kind
      - last_message_at
      - last_message_preview
      - listing
      - unlocked
      - unread_count
      - yard_name
    Dispute:
      type: object
      properties:
        reason:
          type: string
      required:
      - reason
    Duplicate:
      type: object
      properties:
        copy_photos:
          type: boolean
          default: false
    EmailOtpResend:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    EmailOtpVerify:
      type: object
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          maxLength: 6
          minLength: 6
      required:
      - code
      - email
    EnquiryCreate:
      type: object
      properties:
        listing_id:
          type: string
          format: uuid
        supplier_id:
          type: string
          format: uuid
    GeocodeResponse:
      type: object
      properties:
        query:
          type: string
        provider_configured:
          type: boolean
          description: False when LOCATIONIQ_KEY is unset (dev/CI) — results will
            be empty.
        results:
          type: array
          items:
            $ref: '#/components/schemas/GeocodeResult'
      required:
      - provider_configured
      - query
      - results
    GeocodeResult:
      type: object
      properties:
        display_name:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
      required:
      - display_name
      - lat
      - lng
    Handover:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        hire:
          type: string
          format: uuid
        kind:
          $ref: '#/components/schemas/KindCc5Enum'
        photos: {}
        reading: {}
        submitted_by_role:
          type: string
          readOnly: true
        confirmed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - hire
      - id
      - kind
      - submitted_by_role
    HandoverCreate:
      type: object
      properties:
        kind:
          $ref: '#/components/schemas/KindCc5Enum'
        photos:
          type: array
          items:
            type: string
          minItems: 2
        reading:
          type: object
          additionalProperties: {}
      required:
      - kind
      - photos
    Hire:
      type: object
      description: List/summary shape. Fee fields are stripped for the hirer (D-014).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        listing_id:
          type: string
          format: uuid
          readOnly: true
        listing_title:
          type: string
          readOnly: true
        asset_class:
          type: string
          readOnly: true
        yard_id:
          type: string
          nullable: true
          readOnly: true
        listing_photo:
          type: string
          nullable: true
          readOnly: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        duration_days:
          type: integer
          maximum: 2147483647
          minimum: 0
        scheme:
          $ref: '#/components/schemas/SchemeEnum'
        status:
          $ref: '#/components/schemas/ToStatusEnum'
        hire_value:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        hire_value_display:
          type: string
          readOnly: true
        service_fee:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        service_fee_display:
