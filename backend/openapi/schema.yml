  /api/v1/conversations:
    get:
      operationId: conversations_list
      description: '``GET`` the caller''s conversations (+ aggregate unread); ``POST``
        an enquiry.'
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - conversations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversationList'
          description: ''
    post:
      operationId: conversations_create
      description: '``GET`` the caller''s conversations (+ aggregate unread); ``POST``
        an enquiry.'
