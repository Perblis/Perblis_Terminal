  /api/v1/geocode:
    get:
      operationId: geocode_retrieve
      description: |-
        Server-side LocationIQ forward-geocode proxy (TSD §3.8).

        The API key stays server-side; results are 24h-cached. Anonymous access;
        ``search_anon`` throttle (60/min). Degrades to empty results when the
        provider key is absent (dev/CI).
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Max results (1–10, default 5).
      - in: query
        name: q
        schema:
          type: string
        description: Free-text place/address query.
        required: true
      tags:
      - geocode
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeResponse'
          description: ''
