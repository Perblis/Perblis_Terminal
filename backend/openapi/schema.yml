        description: Case-insensitive match on title + description.
      - in: query
        name: radius_km
        schema:
          type: number
          format: double
        description: One of 5/10/25/50/100 or a custom value.
      - in: query
        name: spec_max
        schema:
          type: number
          format: double
        description: Ceiling for the class ★ spec.
      - in: query
        name: spec_min
        schema:
          type: number
          format: double
        description: Floor for the class ★ spec; requires asset_class.
      tags:
      - search
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapResponse'
          description: ''
  /api/v1/spec-templates:
    get:
