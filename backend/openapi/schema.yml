  /api/v1/hires:
    get:
      operationId: hires_list
      description: '``GET`` the caller''s hires (filterable by role/status); ``POST``
        a request.'
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: from
        schema:
          type: string
        description: Only hires overlapping on/after this date (YYYY-MM-DD).
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - hirer
          - supplier
      - in: query
        name: status
        schema:
          type: string
      - in: query
        name: to
        schema:
          type: string
        description: Only hires overlapping on/before this date (YYYY-MM-DD).
      tags:
      - hires
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHireList'
          description: ''
    post:
      operationId: hires_create
      description: '``GET`` the caller''s hires (filterable by role/status); ``POST``
        a request.'
      tags:
      - hires
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HireCreate'
          application/x-www-form-urlencoded:
            schema:
