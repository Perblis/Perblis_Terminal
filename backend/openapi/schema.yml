          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
  /api/v1/conversations/{conversation_id}/messages:
    get:
      operationId: conversations_messages_list
      description: '``GET`` a conversation''s messages (cursor); ``POST`` a new message.'
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - conversations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMessageList'
          description: ''
    post:
      operationId: conversations_messages_create
      description: '``GET`` a conversation''s messages (cursor); ``POST`` a new message.'
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
