{% extends "admin/base_site.html" %}
{% block content %}
<p>{{ title }} — {{ queryset.count }} user(s) selected:</p>
<ul>
  {% for u in queryset %}
    <li>{{ u.email }}</li>
  {% endfor %}
</ul>
<form action="" method="post">{% csrf_token %}
  {{ form.as_p }}
  {% for u in queryset %}
    <input type="hidden" name="_selected_action" value="{{ u.pk }}">
  {% endfor %}
  <input type="hidden" name="action" value="{{ action_name }}">
  <input type="submit" name="apply" value="{{ submit_label }}" class="default">
</form>
{% endblock %}
