# Cloudflare Workers config for the Supplier Portal (D-012).
# Built by @opennextjs/cloudflare; see DEPLOY.md for the deploy steps.
name = "terminal-portal"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Server-side API origin for the BFF (TSD §5) — never exposed to browser JS.
# Override per environment in the Cloudflare dashboard if it moves.
[vars]
API_BASE_URL = "https://api-production-101c8.up.railway.app/api/v1"
