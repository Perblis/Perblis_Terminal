# Cloudflare Workers config for the Supplier Portal (D-012).
# Built by @opennextjs/cloudflare; see DEPLOY.md for the deploy steps.
name = "terminal-portal"
main = "worker-static.mjs"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "out"
binding = "ASSETS"

[observability]
enabled = true

# Backend API on Railway (Wave 0). Override per env in the Cloudflare dashboard if needed.
[vars]
NEXT_PUBLIC_API_BASE_URL = "https://perblisterminal-production.up.railway.app/api/v1"
