  <path d="M9 5v15" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"/>
  <!-- jib tip: hook line + load -->
  <path d="M18 5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <rect x="16.25" y="9" width="3.5" height="3" fill="currentColor"/>
